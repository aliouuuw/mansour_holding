name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'bun.lock'

# Koyeb auto-deploys from GitHub on push — no CI action needed.
# This workflow is kept as a placeholder for future steps (e.g. run tests before deploy).
jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type check API
        run: cd apps/api && bunx tsc --noEmit
